<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="py-4" id="profileRoot">
      <section class="container">
        <div class="row g-4">
          <div class="col-lg-8 reveal">
            <div class="account-card">
              <h2 class="section-title mb-2">My Profile</h2>
              <form id="profileForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Name</label>
                    <input id="proName" class="form-control" autocomplete="name" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input id="proEmail" type="email" class="form-control" disabled />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input id="proPhone" type="tel" inputmode="numeric" class="form-control" autocomplete="tel" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input id="proDob" type="date" class="form-control" />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Avatar URL</label>
                    <input id="proAvatar" class="form-control" placeholder="https://..." />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Bio</label>
                    <textarea id="proBio" class="form-control" rows="3" placeholder="Tell us about yourself"></textarea>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Address Line 1</label>
                    <input id="proLine1" class="form-control" autocomplete="address-line1" />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Address Line 2</label>
                    <input id="proLine2" class="form-control" autocomplete="address-line2" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">City</label>
                    <input id="proCity" class="form-control" autocomplete="address-level2" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">State</label>
                    <input id="proState" class="form-control" autocomplete="address-level1" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Pincode</label>
                    <input id="proPincode" class="form-control" autocomplete="postal-code" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Country</label>
                    <input id="proCountry" class="form-control" value="India" autocomplete="country-name" />
                  </div>
                </div>
                <button class="btn btn-primary-brand mt-3">Save Profile</button>
              </form>
            </div>
          </div>
          <div class="col-lg-4 reveal">
            <div class="account-card mb-3 text-center">
              <img id="profileAvatarPreview" src="/assets/images/pdf-extracted/img-67.jpeg" alt="Avatar" class="profile-avatar mb-2" />
              <p class="small-muted mb-0">Profile preview</p>
            </div>
            <div class="account-card">
              <h4>Change Password</h4>
              <form id="passwordForm">
                <div class="mb-2"><label class="form-label">Current Password</label><input id="pwdCurrent" type="password" class="form-control" required /></div>
                <div class="mb-2"><label class="form-label">New Password</label><input id="pwdNew" type="password" class="form-control" required /></div>
                <button class="btn btn-outline-brand">Update Password</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
