<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Track Order</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="py-4">
      <section class="container mb-4">
        <div class="glass-panel p-4 reveal">
          <h2 class="section-title mb-2">Track Order</h2>
          <p class="section-subtitle">Enter order ID and email used at checkout.</p>
          <form id="trackForm" class="row g-2">
            <div class="col-md-5">
              <input id="trackOrderId" class="form-control" placeholder="Order ID" required />
            </div>
            <div class="col-md-5">
              <input id="trackEmail" type="email" class="form-control" placeholder="Email" required />
            </div>
            <div class="col-md-2 d-grid">
              <button class="btn btn-primary-brand">Track</button>
            </div>
          </form>
        </div>
      </section>
      <section class="container" id="trackResult"></section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/order-track.js"></script>
  </body>
</html>
