<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="py-4">
      <section class="container mb-4">
        <div class="glass-panel p-3 reveal">
          <h2 class="section-title mb-2">Services</h2>
          <p class="section-subtitle mb-2">
            Manufacturing support, customization and reliable delivery for teams and institutions.
          </p>
          <button id="btnToggleServiceTips" class="btn btn-outline-brand btn-sm">Show/Hide Service Tips</button>
          <div id="serviceTips" class="mt-3" style="display: none">
            <ul class="about-list mb-0">
              <li>Share team size and timeline before placing custom orders.</li>
              <li>Use bulk consultation for school/academy purchasing.</li>
              <li>Confirm logo, color and fabric details for custom t-shirt jobs.</li>
            </ul>
          </div>
        </div>
      </section>

      <section class="container">
        <div class="row" id="servicesGrid"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/services.js"></script>
  </body>
</html>
