<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="py-4">
      <section class="container mb-4">
        <div class="glass-panel p-3 reveal">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <div>
              <h2 class="section-title mb-2">Products</h2>
              <p class="section-subtitle mb-2">Filter, sort and discover the right gear</p>
            </div>
            <button id="btnToggleFilters" class="btn btn-outline-brand btn-sm d-lg-none">Filters</button>
          </div>
          <div id="filterPanel" class="slide-panel active">
            <div class="row g-2">
              <div class="col-lg-3 col-md-6">
                <input id="filterSearch" type="text" class="form-control" placeholder="Search products..." />
              </div>
              <div class="col-lg-2 col-md-6">
                <select id="filterCategory" class="form-select"></select>
              </div>
              <div class="col-lg-2 col-md-6">
                <select id="filterBrand" class="form-select">
                  <option value="">All Brands</option>
                </select>
              </div>
              <div class="col-lg-2 col-md-6">
                <select id="filterSort" class="form-select">
                  <option value="newest">Newest</option>
                  <option value="price_asc">Price: Low to High</option>
                  <option value="price_desc">Price: High to Low</option>
                  <option value="name_asc">Name: A-Z</option>
                </select>
              </div>
              <div class="col-lg-2 col-md-6">
                <input id="filterMinPrice" type="number" class="form-control" placeholder="Min Price" />
              </div>
              <div class="col-lg-2 col-md-6">
                <input id="filterMaxPrice" type="number" class="form-control" placeholder="Max Price" />
              </div>
              <div class="col-lg-1 col-md-6 d-grid">
                <button id="btnApplyFilters" class="btn btn-primary-brand">Apply</button>
              </div>
              <div class="col-lg-2 col-md-6 d-grid">
                <button id="btnResetFilters" class="btn btn-outline-secondary">Reset</button>
              </div>
            </div>
          </div>
          <div id="activeFilterChips" class="filter-chip-wrap mt-3"></div>
        </div>
      </section>

      <section class="container">
        <div class="row" id="productGrid"></div>
        <div id="productPagination" class="my-3"></div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/products.js"></script>
  </body>
</html>
