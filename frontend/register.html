<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="container py-4">
      <div class="card glass-panel auth-card reveal">
        <div class="card-body p-4">
          <h2 class="section-title mb-2">Create Account</h2>
          <p class="section-subtitle">Register as a customer and start shopping.</p>
          <form id="registerForm">
            <div class="mb-3">
              <label for="regName" class="form-label">Full Name</label>
              <input id="regName" class="form-control" placeholder="Enter your full name" required />
            </div>
            <div class="mb-3">
              <label for="regEmail" class="form-label">Email</label>
              <input id="regEmail" type="email" class="form-control" placeholder="Enter your email address" required />
              <div id="regEmailError" class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
              <label for="regPhone" class="form-label">Phone Number</label>
              <input
                id="regPhone"
                type="tel"
                inputmode="numeric"
                pattern="[0-9]{10}"
                class="form-control"
                placeholder="Enter 10-digit phone number"
                required
              />
              <div id="regPhoneError" class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
              <label for="regAddress" class="form-label">Address</label>
              <textarea
                id="regAddress"
                class="form-control"
                rows="3"
                placeholder="Enter your complete address"
                required
              ></textarea>
              <div id="regAddressError" class="invalid-feedback"></div>
            </div>
            <div class="mb-3">
              <label for="regPassword" class="form-label">Password</label>
              <input id="regPassword" type="password" class="form-control" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-primary-brand w-100">Register</button>
            <div id="registerAlert" class="mt-3"></div>
          </form>
          <p class="small-muted mt-3 mb-0">
            Already have an account? <a href="login.html">Login</a>
          </p>
        </div>
      </div>
    </main>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
