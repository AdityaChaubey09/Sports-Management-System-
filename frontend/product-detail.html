<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Product Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="py-4" id="productDetailRoot">
      <section class="container">
        <div class="row g-4">
          <div class="col-lg-6 reveal">
            <div class="glass-panel p-3">
              <img id="detailImageMain" src="/assets/images/hero-sports.jpg" alt="Product image" class="img-fluid rounded" />
              <div id="detailThumbs" class="mt-3"></div>
            </div>
          </div>
          <div class="col-lg-6 reveal">
            <div class="glass-panel p-3">
              <h2 id="detailName" class="section-title mb-1">Product Name</h2>
              <p id="detailCategory" class="small-muted mb-3"></p>
              <div class="price-wrap mb-3">
                <span id="detailPrice" class="price-now">&#8377;0</span>
                <span id="detailMrp" class="price-mrp">&#8377;0</span>
              </div>
              <p id="detailDescription"></p>
              <div class="d-flex gap-2">
                <button id="btnDetailAddCart" class="btn btn-primary-brand">Add To Cart</button>
                <button id="btnDetailWishlist" class="btn btn-outline-brand">Wishlist</button>
              </div>
              <hr />
              <h4>Highlights</h4>
              <ul id="detailHighlights"></ul>
            </div>
          </div>
        </div>
      </section>
      <section class="container mt-4">
        <div class="row g-4">
          <div class="col-lg-6 reveal">
            <div class="glass-panel p-3">
              <h4>Technical Specs</h4>
              <div class="table-responsive">
                <table class="table mb-0">
                  <tbody id="detailSpecs"></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="col-lg-6 reveal">
            <div class="glass-panel p-3">
              <h4>Need Help Choosing?</h4>
              <p class="small-muted">Connect with our team for product comparison and bulk recommendations.</p>
              <a href="contact.html" class="btn btn-outline-brand">Contact Support</a>
            </div>
          </div>
        </div>
      </section>
      <section class="container mt-5">
        <h3 class="section-title mb-3">Related Products</h3>
        <div class="row" id="relatedProducts"></div>
      </section>
    </main>
    <div id="site-footer"></div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/product-detail.js"></script>
  </body>
</html>
