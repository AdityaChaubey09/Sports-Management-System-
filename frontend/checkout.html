<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="py-4" id="checkoutView">
      <section class="container mb-4">
        <div class="glass-panel p-4 reveal">
          <h2 class="section-title mb-1">Checkout</h2>
          <p class="section-subtitle mb-0">Enter shipping details and complete payment.</p>
        </div>
      </section>

      <section class="container">
        <div class="row g-4">
          <div class="col-lg-7">
            <div class="glass-panel p-3">
              <h4 class="mb-3">Shipping Address</h4>
              <form id="checkoutForm" novalidate>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Full Name *</label>
                    <input id="shipFullName" class="form-control" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email *</label>
                    <input
                      id="shipEmail"
                      type="email"
                      class="form-control"
                      placeholder="Enter your email address"
                      required
                    />
                    <div id="shipEmailError" class="invalid-feedback"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Phone Number *</label>
                    <input
                      id="shipPhone"
                      type="tel"
                      inputmode="numeric"
                      pattern="[0-9]{10}"
                      class="form-control"
                      placeholder="Enter 10-digit phone number"
                      required
                    />
                    <div id="shipPhoneError" class="invalid-feedback"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Pincode *</label>
                    <input id="shipPincode" class="form-control" required />
                  </div>
                  <div class="col-12">
                    <label class="form-label">Address Line 1 *</label>
                    <input id="shipLine1" class="form-control" placeholder="Enter your complete address" required />
                    <div id="shipLine1Error" class="invalid-feedback"></div>
                  </div>
                  <div class="col-12">
                    <label class="form-label">Address Line 2</label>
                    <input id="shipLine2" class="form-control" />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">City *</label>
                    <input id="shipCity" class="form-control" required />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">State *</label>
                    <input id="shipState" class="form-control" required />
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Country *</label>
                    <input id="shipCountry" class="form-control" value="India" required />
                  </div>
                </div>
                <div class="checkout-pay-panel mt-4 p-3">
                  <h5 class="mb-3">Payment Method</h5>
                  <div class="row g-2">
                    <div class="col-md-6">
                      <label class="checkout-pay-option">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="paymentMethod"
                          id="payMethodRazorpay"
                          value="razorpay"
                          checked
                        />
                        <span>
                          <strong>Pay Online</strong>
                          <small>Razorpay: UPI, Cards, NetBanking</small>
                        </span>
                      </label>
                    </div>
                    <div class="col-md-6">
                      <label class="checkout-pay-option">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="paymentMethod"
                          id="payMethodCod"
                          value="cod"
                        />
                        <span>
                          <strong>Cash On Delivery</strong>
                          <small>Place order now and pay offline</small>
                        </span>
                      </label>
                    </div>
                  </div>
                  <div class="mt-3">
                    <label class="form-label">Gift Card / Payment Code</label>
                    <div class="input-group">
                      <input
                        id="giftCodeInput"
                        class="form-control"
                        placeholder="Enter code (example: GIFT500)"
                        autocomplete="off"
                      />
                      <button id="btnApplyGiftCode" type="button" class="btn btn-outline-brand">
                        Apply
                      </button>
                      <button id="btnClearGiftCode" type="button" class="btn btn-outline-secondary">
                        Clear
                      </button>
                    </div>
                    <div id="giftCodeStatus" class="form-text mt-2"></div>
                  </div>
                </div>
                <button type="submit" class="btn btn-primary-brand mt-3">Place Order</button>
              </form>
              <div id="checkoutNotice" class="mt-3"></div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="glass-panel p-3">
              <h4 class="mb-3">Order Summary</h4>
              <ul class="list-group mb-3" id="checkoutItems"></ul>
              <div class="d-flex justify-content-between mb-1">
                <span>Subtotal</span>
                <strong id="checkoutSubtotal">&#8377;0</strong>
              </div>
              <div class="d-flex justify-content-between mb-1">
                <span>Shipping</span>
                <strong>Free</strong>
              </div>
              <div class="d-flex justify-content-between mb-1 d-none" id="checkoutGiftRow">
                <span>Gift Code Discount</span>
                <strong id="checkoutGiftDiscount">- &#8377;0</strong>
              </div>
              <hr />
              <div class="d-flex justify-content-between">
                <span>Total</span>
                <strong id="checkoutTotal">&#8377;0</strong>
              </div>
              <div class="small-muted mt-2" id="checkoutPaymentHint">Choose payment method to continue.</div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/checkout.js"></script>
  </body>
</html>
