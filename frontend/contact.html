<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="py-4">
      <section class="container mb-4">
        <div class="glass-panel p-4 reveal">
          <h2 class="section-title mb-2">Contact Us</h2>
          <p class="section-subtitle mb-0">Have product queries or bulk requirements? Reach out here.</p>
        </div>
      </section>

      <section class="container">
        <div class="row g-4">
          <div class="col-lg-6">
            <div class="glass-panel p-3 h-100">
              <h4 class="mb-3">Send Message</h4>
              <form id="contactForm">
                <div class="mb-3">
                  <label for="contactName" class="form-label">Full Name</label>
                  <input id="contactName" class="form-control" placeholder="Enter your full name" required />
                  <div id="contactNameError" class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                  <label for="contactEmail" class="form-label">Email</label>
                  <input id="contactEmail" type="email" class="form-control" placeholder="Enter your email address" required />
                  <div id="contactEmailError" class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                  <label for="contactPhone" class="form-label">Phone Number</label>
                  <input
                    id="contactPhone"
                    type="tel"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    class="form-control"
                    placeholder="Enter 10-digit phone number"
                    required
                  />
                  <div id="contactPhoneError" class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                  <label for="contactAddress" class="form-label">Address</label>
                  <textarea
                    id="contactAddress"
                    class="form-control"
                    rows="3"
                    placeholder="Enter your complete address"
                    required
                  ></textarea>
                  <div id="contactAddressError" class="invalid-feedback"></div>
                </div>
                <div class="mb-3">
                  <label for="contactMessage" class="form-label">Message</label>
                  <textarea id="contactMessage" class="form-control" rows="5" placeholder="Write your message" required></textarea>
                  <div id="contactMessageError" class="invalid-feedback"></div>
                </div>
                <button class="btn btn-primary-brand">Submit</button>
              </form>
              <div id="contactFormAlert" class="mt-3"></div>
            </div>
          </div>
          <div class="col-lg-6">
            <div class="glass-panel p-3 h-100">
              <h4 class="mb-3">Support Details</h4>
              <p class="mb-1"><strong>Email:</strong> careers@shivam.com</p>
              <p class="mb-1"><strong>Phone:</strong> +91 90000 00000</p>
              <p class="mb-3"><strong>Address:</strong> Shivam Enterprises, India</p>
              <button id="btnMapToggle" class="btn btn-outline-brand btn-sm mb-2">Show/Hide Map Preview</button>
              <div id="mapPreview" style="display: none">
                <img src="/assets/images/pdf-pages/page-1.png" class="img-fluid rounded" alt="Map preview" />
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/contact.js"></script>
  </body>
</html>
