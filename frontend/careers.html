<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivam Sports | Careers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>

    <main class="py-4">
      <section class="container mb-4">
        <div class="glass-panel p-4 reveal">
          <h2 class="section-title mb-2">Careers</h2>
          <p class="mb-1">Let's do things together. Are you up for it?</p>
          <p class="mb-1">Join Shivam Sports by sending your updated Curriculum Vitae.</p>
          <p class="mb-0">
            Join us via:
            <a href="mailto:careers@shivam.com"><strong>careers@shivam.com</strong></a>
          </p>
        </div>
      </section>

      <section class="container">
        <div class="row" id="jobsGrid"></div>
      </section>
    </main>

    <div class="modal fade" id="jobApplyModal" tabindex="-1" aria-labelledby="jobApplyModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable modal-fullscreen-sm-down">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="jobApplyModalLabel">Apply for <span id="applyJobTitle"></span></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form id="jobApplyForm" novalidate>
            <div class="modal-body">
              <input type="hidden" id="applyJobId" />
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">Full Name *</label>
                  <input
                    id="applyFullName"
                    class="form-control"
                    placeholder="Enter your full name"
                    minlength="2"
                    maxlength="80"
                    pattern="[A-Za-z][A-Za-z .'-]{1,79}"
                    autocomplete="name"
                    required
                  />
                  <div id="applyFullNameError" class="invalid-feedback"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email *</label>
                  <input
                    id="applyEmail"
                    type="email"
                    class="form-control"
                    placeholder="Enter your email address"
                    autocomplete="email"
                    required
                  />
                  <div id="applyEmailError" class="invalid-feedback"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Phone Number *</label>
                  <input
                    id="applyPhone"
                    type="tel"
                    inputmode="numeric"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    class="form-control"
                    placeholder="Enter 10-digit phone number"
                    autocomplete="tel"
                    required
                  />
                  <div id="applyPhoneError" class="invalid-feedback"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Resume Link</label>
                  <input id="applyResumeLink" type="url" class="form-control" placeholder="https://..." />
                </div>
                <div class="col-12">
                  <label class="form-label">Address *</label>
                  <textarea
                    id="applyAddress"
                    class="form-control"
                    rows="2"
                    placeholder="Enter your complete address"
                    required
                  ></textarea>
                  <div id="applyAddressError" class="invalid-feedback"></div>
                </div>
                <div class="col-12">
                  <label class="form-label">Cover Letter</label>
                  <textarea id="applyCoverLetter" class="form-control" rows="4"></textarea>
                </div>
                <div class="col-12">
                  <div id="jobApplyAlert"></div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
              <button type="submit" class="btn btn-primary-brand">Submit Application</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div id="site-footer"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/api.js"></script>
    <script src="js/common.js"></script>
    <script src="js/careers.js"></script>
  </body>
</html>
